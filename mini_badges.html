---
layout: default
---
<header>
    <div class="slogan"></div>
        <p class="tagline bordered-text-alt">Mini Badg.ES</p>
    </div>
</header>
<section id="about" class="section-odd">
    <div class="features">
    {%- for mini_badge in site.mini_badges -%}
        <div class="feature-card">
            <div class="feature-img">
                <img src= {{ mini_badge.img }} alt="Mini Badg.ES">
            </div>
            <h3 class="translate" data-en="{{ mini_badge.title-en | escape }}" data-es="{{ mini_badge.title-es | escape }}"> {{ mini_badge.title-es | escape }} </h3>
            <p class="translate" data-en="{{ mini_badge.price-en | escape }}" data-es="{{ mini_badge.price-es | escape }}"> {{ mini_badge.price-es | escape }} </p>
        </div>
    {%- endfor -%}
    </div>
</section>
<section id="contact" class="section-even">
    <div class="container">
        <h2 class="translate" data-en="Contact us for quote" data-es="Contáctanos para presupuesto">Contáctanos para presupuesto</h2>
        <div class="contact-links">
            <a href="https://github.com/thebadg-es" target="_blank" class="contact-link">
                <img src="assets/icons/github.svg" alt="GitHub" class="contact-icon">
            </a>
            <a href="https://x.com/TheBadg_ES" target="_blank" class="contact-link">
                <img src="assets/icons/x.svg" alt="Twitter" class="contact-icon">
            </a>
            <a href="https://instagram.com/thebadg.es" target="_blank" class="contact-link">
                <img src="assets/icons/instagram.svg" alt="Instagram" class="contact-icon">
            </a>
            <a href="mailto:info@thebadg.es" class="contact-link">
                <img src="assets/icons/email.svg" alt="Email" class="contact-icon">
            </a>
        </div>
    </div>
</section>

<script src="js/scripts.js"></script>
