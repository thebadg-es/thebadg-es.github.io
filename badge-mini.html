<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Badg.ES</title>
    <link rel="stylesheet" href="./style.css">
    <link href="https://fonts.googleapis.com/css2?family=Quantico&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="navbar">
        <div class="container nav-container">
            <div class="navbar-logo">
                <a href="index.html">
                    <img src="images/TheBadg.ES Logo.svg" alt="main_logo">
                </a>
            </div>
            <div class="hamburger-menu">
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
            </div>
            <ul class="nav-menu">
                <div class="language-selector">
                    <span class="language-option active" data-lang="es" onclick="changeLanguage('es')">ES</span> |
                    <span class="language-option" data-lang="en" onclick="changeLanguage('en')">EN</span>
                </div>
            </ul>
        </div>
    </nav>

    <header>
        <div class="container">
            <div class="slogan"></div>
                <p class="tagline bordered-text-alt">Mini Badg.ES</p>
            </div>
        </div>
    </header>
    <section id="desings" class="section-odd">
        <div class="container">
            <h2 class="translate" data-en="DESIGNS" data-es="DISEÑOS">DISEÑOS</h2>
            <div class="badge-grid">
               
                <div class="badge-card-info">
                    <div class="badge-img">
                        <img src="images/TheBadg-square.svg" alt="ALIEN">
                    </div>
                    <div class="badge-info">
                        <h3 class="badge-title">ALIEN</h3>
                    </div>        
                </div>
                
                <div class="badge-card-info">
                    <div class="badge-img">
                        <img src="images/TheBadg-square.svg" alt="DUCK">
                    </div>
                    <div class="badge-info">
                        <h3 class="badge-title">DUCK</h3>
                    </div>        
                </div>
                
                <div class="badge-card-info">
                    <div class="badge-img">
                        <img src="images/TheBadg-square.svg" alt="ROCKET">
                    </div>
                    <div class="badge-info">
                        <h3 class="badge-title">ROCKET</h3>
                    </div>        
                </div>
            </div>
        </div>
    </section>
    <section id="prices" class="section-even">
        <div class="container">
            <h2 class="translate" data-en="PRICES TABLE" data-es="TABLA DE PRECIOS">TABLA DE PRECIOS</h2>
        </div>
    </section>
    <footer>
        <p>© 2025 TechBadges. All rights reserved.</p>
    </footer>
</body>
</html>
